# RelayOS Docker Compose
# One-command startup for demos: docker-compose up --build
# For full self-hosted (bundled DB + n8n): docker-compose -f docker-compose.yml -f docker-compose.full.yml up

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: relayos-network

